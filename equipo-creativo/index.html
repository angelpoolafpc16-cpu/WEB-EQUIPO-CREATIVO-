<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipo Creativo — Agencia de Marketing</title>
<meta name="description" content="Agencia de marketing digital y redes sociales en Mérida. Estrategia, branding y contenido que conecta.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --azul:#2946BF;
    --azul-osc:#16216B;
    --naranja:#FC5F22;
    --negro:#FFFFFF;
    --crema:#F4F2EC;
    --blanco:#FFFFFF;

    --display:'League Spartan', sans-serif;
    --body:'Montserrat', sans-serif;

    --radius:20px;
    --maxw:1220px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--crema);
    color:var(--negro);
    font-family:var(--body);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  img{max-width:100%;display:block;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 28px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }
  :focus-visible{outline:3px solid var(--naranja); outline-offset:3px;}

  h1,h2,h3,.display{font-family:var(--display); font-weight:700;}

  header{
    position:sticky; top:0; z-index:100;
    background:var(--crema);
    border-bottom:3px solid var(--negro);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px; max-width:var(--maxw); margin:0 auto;
  }
  .logo-img{height:42px; width:auto;}
  .nav-links{display:flex; gap:30px; font-weight:700; font-size:15px;}
  .nav-links a{position:relative; padding:4px 0;}
  .nav-links a::after{
    content:""; position:absolute; left:0; bottom:0;
    width:0%; height:3px; background:var(--naranja);
    transition:width .25s ease;
  }
  .nav-links a:hover::after{width:100%;}
  .nav-cta{
    background:var(--azul); color:var(--blanco);
    padding:12px 24px; border-radius:999px;
    font-weight:700; font-size:14px;
    border:2px solid var(--negro);
    transition:transform .2s ease, background .2s ease;
    white-space:nowrap;
  }
  .nav-cta:hover{background:var(--naranja); transform:translateY(-2px);}

  @media (max-width:860px){
    .nav-links{display:none;}
  }

  .hero{position:relative; padding:80px 0 56px; overflow:hidden; background:var(--negro); color:var(--crema);}
  .hero-grid{display:grid; grid-template-columns:1.1fr 0.9fr; gap:50px; align-items:center;}
  @media (max-width:900px){.hero-grid{grid-template-columns:1fr; gap:40px;}}

  .eyebrow{
    display:inline-flex; align-items:center; gap:10px;
    background:var(--azul); color:var(--blanco);
    padding:8px 16px; border-radius:999px;
    font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    margin-bottom:26px;
  }
  .eyebrow .pulse{width:8px; height:8px; border-radius:50%; background:var(--naranja); animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:.4; transform:scale(1.3);}}

  .hero h1{
    font-family:var(--display);
    font-weight:700;
    font-size:clamp(40px, 6.2vw, 78px);
    line-height:1.02;
    letter-spacing:.01em;
